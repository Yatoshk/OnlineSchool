version: '3.8'

services:
  # Основное приложение
  app:
    build:
      context: .
      dockerfile: OnlineSchool/Dockerfile
    container_name: online-school-app
    restart: unless-stopped
    networks:
      - app-network

  # Второе приложение (копия)
  app-copy:
    build:
      context: .
      dockerfile: OnlineSchoolCopy/WebApp/Dockerfile # Или другой Dockerfile, если приложения разные
    container_name: online-school-app-copy
    restart: unless-stopped
    networks:
      - app-network

  # Nginx с SSL
  nginx:
    image: nginx:alpine
    container_name: online-school-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./cert/www:/var/www/certbot:ro
    depends_on:
      - app
      - app-copy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge